transcript:
  prefer_manual: true
  whisper_model: distil-large-v3  # distilled Whisper: faster than medium with equal/better accuracy

chunking:
  strategy: hybrid
  max_tokens: 650
  min_tokens: 120
  overlap_tokens: 80

frames:
  enabled: true
  extraction_mode: dense
  frame_change_threshold: 4         # more sensitive for educational content
  scene_diff_threshold: 0.15
  top_k: 50
  frames_per_section: 4
  vlm_rerank_enabled: true
  vlm_max_candidates: 6

llm_processing:
  hierarchical: true
  parallel_workers: 4
  explanation_style: educational
  max_chunks_per_topic: 4
  max_chunk_summaries_per_subsection: 2
  boundary_threshold: 0.52

importance:
  threshold: 0.12

output:
  include_timestamp_index: true
  embed_frames_inline: true
